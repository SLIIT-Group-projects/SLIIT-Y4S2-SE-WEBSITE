  <path d="M340 380c24 0 44-20 44-44s-20-44-44-44" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M352 380c32 0 58-26 58-58s-26-58-58-58" stroke="#818cf8" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
