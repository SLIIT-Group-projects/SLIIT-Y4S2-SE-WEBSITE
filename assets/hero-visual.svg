    <rect x="0" y="0" width="200" height="268" rx="20" fill="#0f172a" stroke="#334155" stroke-width="3"/>
    <rect x="14" y="18" width="172" height="216" rx="12" fill="url(#screen)"/>
    <!-- abstract hands / sign on screen -->
    <path d="M48 120c20-28 52-28 72 0s52 28 72 0" stroke="rgba(255,255,255,0.85)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <circle cx="86" cy="78" r="14" fill="#fbbf24" opacity="0.95"/>
    <circle cx="134" cy="64" r="12" fill="#34d399" opacity="0.95"/>
    <circle cx="118" cy="168" r="12" fill="#f472b6" opacity="0.95"/>
    <rect x="70" y="188" width="72" height="10" rx="5" fill="rgba(255,255,255,0.35)"/>
    <rect x="56" y="206" width="100" height="8" rx="4" fill="rgba(255,255,255,0.22)"/>
    <circle cx="100" cy="236" r="6" fill="#fff" opacity="0.5"/>
    <rect x="70" y="248" width="88" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="76" y="252" width="48" height="6" rx="3" fill="rgba(255,255,255,0.35)"/>
    <circle cx="100" cy="256" r="16" fill="#1e293b" opacity="0.4"/>
  </g>
  <!-- floating badges -->
  <g opacity="0.95">
