<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="52" y1="0" x2="468" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e0f2fe"/>
      <stop offset="0.35" stop-color="#fce7f3"/>
      <stop offset="0.65" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="screen" x1="280" y1="120" x2="420" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.45" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="shirt" x1="120" y1="200" x2="220" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d9488"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="520" height="440" rx="32" fill="url(#bg)"/>
  <ellipse cx="120" cy="380" rx="90" ry="18" fill="#0c1f36" opacity="0.12"/>
  <ellipse cx="400" cy="120" rx="70" ry="70" fill="#f472b6" opacity="0.2"/>
  <ellipse cx="80" cy="100" rx="50" ry="50" fill="#22d3ee" opacity="0.22"/>
  <ellipse cx="420" cy="360" rx="56" ry="56" fill="#a78bfa" opacity="0.18"/>
  <!-- learner -->
  <g filter="url(#soft)">
    <circle cx="168" cy="168" r="44" fill="#fecdd3"/>
    <circle cx="152" cy="162" r="8" fill="#fda4af" opacity="0.7"/>
    <circle cx="188" cy="164" r="8" fill="#fda4af" opacity="0.7"/>
    <path d="M128 218c0-24 20-44 44-44h8c24 0 44 20 44 44v92c0 12-10 22-22 22h-52c-12 0-22-10-22-22V218z" fill="url(#shirt)"/>
    <path d="M108 228c16-8 28 4 24 32l-8 52c-2 12 6 20 18 18" stroke="#fcd34d" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M232 220c-12 8-8 28 8 40l36 24" stroke="#fcd34d" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
    <rect x="142" y="312" width="22" height="56" rx="10" fill="#1e3a8a"/>
    <rect x="188" y="312" width="22" height="56" rx="10" fill="#1e3a8a"/>
  </g>
  <!-- tablet -->
